.licon{font-size:44px;margin-bottom:12px}

  ];

  var premHtml=premios.map(function(p){
    var cls=p.ok?'bok':p.cerca?'bwarn':'bpend';
    var txt=p.ok?'\u2713 Logrado':p.cerca?'Cerca':'Pendiente';
    if(p.pnp){cls=p.ok?'bok':'bpend';txt=p.ok?'\u2713 PASA':'NO PASA';}
    var style=p.pnp?'font-weight:700;':'';
    return '<div class="premio-row" style="'+style+'"><span>'+p.l+'</span><span class="badge '+cls+'">'+txt+'</span></div>';
  }).join('');

  // Build client lookup index for this vendor
  var clientIdx={};
  BKEYS.forEach(function(bkey,bi){
    var clients=v.cob[bkey]||[];
    clients.forEach(function(c){
      var id=c[0];
      if(!clientIdx[id]) clientIdx[id]={id:id,addr:c[3]||'',brands:{}};
      clientIdx[id].brands[bi]={u:c[1],ok:c[2]};
    });
  });

  var brandsHtml=v.b.map(function(b,i){
    var obj=Math.round(b[0]),ped=b[1],av=(ped===obj&&ped===Math.round(ped))?1:b[2];
    var col2=pc(av);
    var barW=Math.min(Math.round(av*100),100);
    var bkey=BKEYS[i];
    var clients=v.cob[bkey]||[];
    var hasCli=clients.length>0;
    var minVal=MINS[i];
    var minLabel='<span style="font-size:10px;color:#888;background:#f0f2f8;border-radius:6px;padding:2px 6px;margin-left:6px">m\u00edn. '+minVal+' u</span>';

    var chips='';
    if(hasCli){
      var comp=clients.filter(function(c){return c[2]===1;}).length;
      var inc=clients.length-comp;
      chips='<div class="chips">';
      if(comp>0) chips+='<span class="chip chip-ok">\u2713 '+comp+' completos</span>';
      if(inc>0)  chips+='<span class="chip chip-warn">\u26a0 '+inc+' incompletos</span>';
      chips+='</div><div class="chip-hint">\u25be Ver clientes</div>';
    }

    var panel='';
    if(hasCli){
      var comp2=clients.filter(function(c){return c[2]===1;}).length;
      var inc2=clients.length-comp2;
      var sorted=clients.slice().sort(function(a,b){return a[2]-b[2];});
      var rows=sorted.map(function(c){
        var ok=c[2]===1;
        var sold=c[1]||0;
        var adr=c[3]||'';
        var borderL=ok?'#16a34a':sold>0?'#f59e0b':'#dc2626';
        var rightTxt='',rightCol='';
        if(ok){rightTxt='Completo \u2713';rightCol='#16a34a';}
        else if(sold>0){rightTxt='Faltan '+(minVal-sold)+' u';rightCol='#d97706';}
        else{rightTxt='Sin compra';rightCol='#dc2626';}
        return '<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:0.5px solid #e8ecf4;border-left:3px solid '+borderL+';background:#fff">'
          +'<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;color:#1a1a2e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(adr?adr:c[0])+'</div>'
          +'<div style="font-size:11px;color:#888">'+c[0]+'</div></div>'
          +'<div style="font-size:12px;font-weight:600;color:'+rightCol+';flex-shrink:0;text-align:right;max-width:130px">'+rightTxt+'</div></div>';
      }).join('');
      panel='<div class="cob-panel" id="cp-'+v.r+'-'+i+'">'
        +'<div class="cob-stats">'
        +'<div class="cob-stat"><div class="cob-stat-val '+pcc(av)+'">'+fp(av)+'</div><div class="cob-stat-lbl">Avance</div></div>'
        +'<div class="cob-stat"><div class="cob-stat-val cg">'+comp2+'</div><div class="cob-stat-lbl">Completos</div></div>'
        +'<div class="cob-stat"><div class="cob-stat-val '+(inc2>0?'cr':'cg')+'">'+inc2+'</div><div class="cob-stat-lbl">Incompletos</div></div>'
        +'</div><div style="padding:10px 0 4px">'+rows+'</div></div>';
    }

    var borderCol=av>=1?'#16a34a':av>=0.5?'#d97706':'#dc2626';
    var onclick=hasCli?' onclick="tog(\''+v.r+'\','+i+')"':'';
    return '<div class="brand-row" style="border-color:'+borderCol+'"'+onclick+'>'
      +'<div class="brand-top"><span class="brand-name">'+BRANDS[i]+minLabel+'</span>'
      +'<span class="brand-pct" style="color:'+col2+'">'+fp(av)+'</span></div>'
      +'<div class="bar-bg"><div class="bar-fill" style="width:'+barW+'%;background:'+col2+'"></div></div>'
      +'<div class="brand-meta"><span>Obj: '+fo(obj)+'</span><span>Pedido: '+fo(ped)+'</span></div>'
      +chips+'</div>'+panel;
  }).join('');

  // Search HTML
  var searchHtml='<div class="card" style="margin-bottom:14px">'
    +'<div class="sec-title">\ud83d\udd0d Buscar cliente</div>'
    +'<div class="search-box">'
    +'<input class="search-input" id="srch-'+v.r+'" type="text" placeholder="Direcci\u00f3n o n\u00famero de cliente" oninput="buscarCliente(\''+v.r+'\')" autocomplete="off">'
    +'</div>'
    +'<div id="srch-res-'+v.r+'"></div>'
    +'</div>';

  // Store client index globally for search
  window._clientIdx = clientIdx;
  window._currentRuta = v.r;

  document.getElementById('content').innerHTML=
    '<div class="section">'
    +'<div class="card">'
    +'<div class="sum-top"><div class="sum-pct" style="color:'+col+'">'+fp(v.prom)+'</div>'
    +'<div class="sum-lbl">Promedio general</div></div>'
    +'<div class="sum-grid">'
    +'<div class="sum-cell"><div class="sum-val cy">'+m50+'</div><div class="sum-clbl">Marcas \u2265 50%</div></div>'
    +'<div class="sum-cell"><div class="sum-val cg">'+m100+'</div><div class="sum-clbl">Marcas \u2265 100%</div></div>'
    +'</div></div>'
    +'<div class="card"><div class="sec-title">\ud83c\udfc6 Estado de premios</div>'+premHtml+'</div>'
    +searchHtml
    +'<div style="padding:0 0 4px">'+brandsHtml+'</div>'
    +'</div>';
}

function buscarCliente(ruta){
  var q=document.getElementById('srch-'+ruta).value.trim().toLowerCase();
  var res=document.getElementById('srch-res-'+ruta);
  if(q.length<2){res.innerHTML='';return;}
  var idx=window._clientIdx||{};
  var matches=Object.values(idx).filter(function(c){
    return c.id.toLowerCase().includes(q)||(c.addr&&c.addr.toLowerCase().includes(q));
  }).slice(0,5);
  if(!matches.length){res.innerHTML='<div style="padding:10px 16px;font-size:13px;color:#888">Sin resultados</div>';return;}
  var html=matches.map(function(c){
    var rows=BKEYS.map(function(bkey,bi){
      var bd=c.brands[bi];
      if(!bd) return '';
      var minVal=MINS[bi];
      var ok=bd.ok===1;
      var sold=bd.u||0;
      var borderL=ok?'#16a34a':sold>0?'#f59e0b':'#dc2626';
      var rightTxt='',rightCol='';
      if(ok){rightTxt='Completo \u2713';rightCol='#16a34a';}
      else if(sold>0){rightTxt='Faltan '+(minVal-sold)+' u';rightCol='#d97706';}
      else{rightTxt='Sin compra';rightCol='#dc2626';}
      return '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 16px;border-bottom:0.5px solid #f0f2f8;border-left:3px solid '+borderL+';background:#fff">'
        +'<span style="font-size:13px;color:#1a1a2e">'+BRANDS[bi]+'</span>'
        +'<span style="font-size:12px;font-weight:600;color:'+rightCol+'">'+rightTxt+'</span></div>';
    }).join('');
    return '<div style="border-top:1px solid #f0f2f8">'
      +'<div style="padding:10px 16px;background:#f8faff">'
      +'<div style="font-size:13px;font-weight:700;color:#1a1a2e">'+(c.addr||c.id)+'</div>'
      +'<div style="font-size:11px;color:#888">'+c.id+'</div></div>'
      +rows+'</div>';
  }).join('');
  res.innerHTML=html;
}

function tog(ruta,idx){
  var id='cp-'+ruta+'-'+idx;
  var panel=document.getElementById(id);
  if(!panel) return;
  var wasOpen=panel.classList.contains('open');
  document.querySelectorAll('.cob-panel.open').forEach(function(p){p.classList.remove('open');});
  if(!wasOpen) panel.classList.add('open');
}
</script>
</body>
</html>
