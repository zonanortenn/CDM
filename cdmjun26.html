*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#f5f7fa;color:#1a1a2e;font-family:'Inter',sans-serif;min-height:100vh;font-size:15px}
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.lcard{background:#fff;border-radius:20px;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:40px 28px;width:100%;max-width:360px;text-align:center}
.licon{font-size:44px;margin-bottom:12px}
.ltitle{font-size:22px;font-weight:800;margin-bottom:4px}
.lsub{color:#888;font-size:13px;margin-bottom:6px}
.ldate{font-size:12px;color:#bbb;margin-bottom:28px}
.linput{width:100%;border:2px solid #e0e4ee;border-radius:12px;font-family:'Inter',sans-serif;font-size:20px;font-weight:700;letter-spacing:3px;padding:14px;text-align:center;outline:none;color:#1a1a2e;transition:border .2s}
.linput:focus{border-color:#2563eb}
.lbtn{width:100%;margin-top:12px;background:#2563eb;border:none;border-radius:12px;color:#fff;font-family:'Inter',sans-serif;font-size:16px;font-weight:700;padding:15px;cursor:pointer}
.lbtn:active{background:#1d4ed8}
.lerr{color:#ef4444;font-size:13px;margin-top:8px;display:none}
.lhint{color:#aaa;font-size:12px;margin-top:18px;line-height:1.7}
#app{display:none}
.header{background:#fff;border-bottom:1px solid #e8ecf4;padding:14px 16px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center}
.hname{font-size:17px;font-weight:800;color:#1a1a2e}
.hsub{font-size:12px;color:#888;margin-top:1px}
.hbadge{background:#2563eb;color:#fff;font-size:13px;font-weight:700;border-radius:8px;padding:4px 12px;flex-shrink:0;margin-left:8px}
.section{padding:16px;max-width:680px;margin:0 auto}
.card{background:#fff;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.06);margin-bottom:14px;overflow:hidden}
.sum-top{padding:24px 20px 18px;text-align:center;border-bottom:1px solid #f0f2f8}
.sum-pct{font-size:56px;font-weight:800;line-height:1}
.sum-lbl{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.sum-grid{display:grid;grid-template-columns:1fr 1fr}
.sum-cell{padding:16px;text-align:center}
.sum-cell:first-child{border-right:1px solid #f0f2f8}
.sum-val{font-size:28px;font-weight:800}
.sum-clbl{font-size:12px;color:#888;margin-top:3px}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#aaa;padding:14px 16px 8px}
.premio-row{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-top:1px solid #f0f2f8;font-size:14px;color:#333}
.badge{font-size:11px;font-weight:700;border-radius:20px;padding:4px 12px;flex-shrink:0;margin-left:8px}
.bok{background:#dcfce7;color:#16a34a}
.bpend{background:#f1f5f9;color:#94a3b8}
.bwarn{background:#fff7ed;color:#ea580c}
.brand-row{padding:14px 16px;cursor:pointer;transition:background .15s;border-radius:12px;border:2px solid #e0e4ee;margin-bottom:10px}
.brand-row:last-child{margin-bottom:0}
.brand-row:active{opacity:.9}
.brand-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.brand-name{font-size:15px;font-weight:700;color:#1a1a2e}
.brand-pct{font-size:22px;font-weight:800}
.bar-bg{height:8px;background:#f0f2f8;border-radius:4px;overflow:hidden;margin-bottom:8px}
.bar-fill{height:8px;border-radius:4px}
.brand-meta{display:flex;justify-content:space-between;font-size:13px;color:#666}
.chips{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.chip{font-size:11px;font-weight:600;border-radius:20px;padding:3px 10px}
.chip-ok{background:#dcfce7;color:#16a34a}
.chip-warn{background:#fee2e2;color:#dc2626}
.chip-hint{font-size:12px;color:#2563eb;margin-top:6px}
.cob-panel{display:none;background:#f8faff;border-top:1px solid #e8ecf4;border-radius:0 0 10px 10px}
.cob-panel.open{display:block}
.cob-stats{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid #e8ecf4}
.cob-stat{padding:12px 8px;text-align:center}
.cob-stat:not(:last-child){border-right:1px solid #e8ecf4}
.cob-stat-val{font-size:20px;font-weight:800}
.cob-stat-lbl{font-size:10px;color:#888;margin-top:2px}
.cg{color:#16a34a}.cy{color:#d97706}.cr{color:#dc2626}
.search-box{padding:0 12px 12px}
.search-input{width:100%;border:2px solid #e0e4ee;border-radius:10px;font-family:'Inter',sans-serif;font-size:14px;padding:10px 14px;outline:none;color:#1a1a2e;transition:border .2s}
.search-input:focus{border-color:#2563eb}
@media(min-width:600px){.section{padding:20px}.header{padding:16px 24px}}
</style>

        +'</div><div style="padding:10px 0 4px">'+rows+'</div></div>';
    }

    // Color borde según clientes completos vs total (no por % de CCC)
    var totalCli=clients.length;
    var compCli=clients.filter(function(c){return c[2]===1;}).length;
    var borderCol;
    if(totalCli===0){
      borderCol=av>=1?'#16a34a':av>=0.5?'#d97706':'#dc2626';
    } else if(compCli===totalCli){
      borderCol='#16a34a';
    } else if(compCli>0||clients.some(function(c){return (c[1]||0)>0;})){
      borderCol='#d97706';
    } else {
      borderCol='#dc2626';
    }
    var onclick=hasCli?' onclick="tog(\''+v.r+'\','+i+')"':'';
    return '<div class="brand-row" style="border-color:'+borderCol+'"'+onclick+'>'
      +'<div class="brand-top"><span class="brand-name">'+BRANDS[i]+minLabel+'</span>'
      +'<span class="brand-pct" style="color:'+col2+'">'+fp(av)+'</span></div>'
      +'<div class="bar-bg"><div class="bar-fill" style="width:'+barW+'%;background:'+col2+'"></div></div>'
      +'<div class="brand-meta"><span>Obj: '+fo(obj)+'</span><span>Pedido: '+fo(ped)+'</span></div>'
      +chips+'</div>'+panel;
  }).join('');

  // Search HTML
  var searchHtml='<div class="card" style="margin-bottom:14px">'
    +'<div class="sec-title">\ud83d\udd0d Buscar cliente</div>'
    +'<div class="search-box">'
    +'<input class="search-input" id="srch-'+v.r+'" type="text" placeholder="Direcci\u00f3n o n\u00famero de cliente" oninput="buscarCliente(\''+v.r+'\')" autocomplete="off">'
    +'</div>'
    +'<div id="srch-res-'+v.r+'"></div>'
    +'</div>';

  // Store client index globally for search
  window._clientIdx = clientIdx;
  window._currentRuta = v.r;

  document.getElementById('content').innerHTML=
    '<div class="section">'
    +'<div class="card">'
    +'<div class="sum-top"><div class="sum-pct" style="color:'+col+'">'+fp(v.prom)+'</div>'
    +'<div class="sum-lbl">Promedio general</div></div>'
    +'<div class="sum-grid">'
    +'<div class="sum-cell"><div class="sum-val cy">'+m50+'</div><div class="sum-clbl">Marcas \u2265 50%</div></div>'
    +'<div class="sum-cell"><div class="sum-val cg">'+m100+'</div><div class="sum-clbl">Marcas \u2265 100%</div></div>'
    +'</div></div>'
    +'<div class="card"><div class="sec-title">\ud83c\udfc6 Estado de premios</div>'+premHtml+'</div>'
    +searchHtml
    +'<div style="padding:0 0 4px">'+brandsHtml+'</div>'
    +'</div>';
}

function buscarCliente(ruta){
  var q=document.getElementById('srch-'+ruta).value.trim().toLowerCase();
  var res=document.getElementById('srch-res-'+ruta);
  if(q.length<2){res.innerHTML='';return;}
  var idx=window._clientIdx||{};
  var matches=Object.values(idx).filter(function(c){
    return c.id.toLowerCase().includes(q)||(c.addr&&c.addr.toLowerCase().includes(q));
  }).slice(0,5);
  if(!matches.length){res.innerHTML='<div style="padding:10px 16px;font-size:13px;color:#888">Sin resultados</div>';return;}
  var html=matches.map(function(c){
    var rows=BKEYS.map(function(bkey,bi){
      var bd=c.brands[bi];
      if(!bd) return '';
      var minVal=MINS[bi];
      var ok=bd.ok===1;
      var sold=bd.u||0;
      var borderL=ok?'#16a34a':sold>0?'#f59e0b':'#dc2626';
      var rightTxt='',rightCol='';
      if(ok){rightTxt='Completo \u2713';rightCol='#16a34a';}
      else if(sold>0){rightTxt='Faltan '+(minVal-sold)+' u';rightCol='#d97706';}
      else{rightTxt='Sin compra';rightCol='#dc2626';}
      return '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 16px;border-bottom:0.5px solid #f0f2f8;border-left:3px solid '+borderL+';background:#fff">'
        +'<span style="font-size:13px;color:#1a1a2e">'+BRANDS[bi]+'</span>'
        +'<span style="font-size:12px;font-weight:600;color:'+rightCol+'">'+rightTxt+'</span></div>';
    }).join('');
    return '<div style="border-top:1px solid #f0f2f8">'
      +'<div style="padding:10px 16px;background:#f8faff">'
      +'<div style="font-size:13px;font-weight:700;color:#1a1a2e">'+(c.addr||c.id)+'</div>'
      +'<div style="font-size:11px;color:#888">'+c.id+'</div></div>'
      +rows+'</div>';
  }).join('');
  res.innerHTML=html;
}

function tog(ruta,idx){
  var id='cp-'+ruta+'-'+idx;
  var panel=document.getElementById(id);
  if(!panel) return;
  var wasOpen=panel.classList.contains('open');
  document.querySelectorAll('.cob-panel.open').forEach(function(p){p.classList.remove('open');});
  if(!wasOpen) panel.classList.add('open');
}
</script>
